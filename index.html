<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARIEPOSA</title>
  <meta name="description" content="MARIEPOSA — Founder Phase." />

  <style>
    :root{
      --bg:#0a0605;                 /* deep espresso */
      --bg2:#120907;                /* richer espresso */
      --ink:#F5F0E8;                /* warm ivory */
      --muted:rgba(245,240,232,.60);
      --hair:rgba(245,240,232,.12);
      --gold:#C8A24B;               /* soft gold */
      --gold2:rgba(200,162,75,.22);
      --card:rgba(245,240,232,.06);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:
        radial-gradient(1100px 700px at 50% 12%, rgba(200,162,75,.12), transparent 55%),
        radial-gradient(900px 600px at 20% 88%, rgba(245,240,232,.05), transparent 60%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      color:var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      letter-spacing:.2px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    a{color:inherit;text-decoration:none}
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:34px 18px 30px;
      min-height:100%;
      display:flex;
      flex-direction:column;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:10px 0 18px;
      border-bottom:1px solid var(--hair);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    /* Butterfly logo container (shows your gold butterfly) */
    .logoBox{
      width:46px;height:46px;
      border-radius:18px;
      border:1px solid var(--gold2);
      background: rgba(245,240,232,.05);
      display:grid;place-items:center;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(200,162,75,.06) inset,
        0 10px 30px rgba(0,0,0,.28);
    }
    .logoBox img{
      width:100%;height:100%;
      object-fit:contain;
      padding:6px;
      display:block;
    }

    .wordmark{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }
    .name{
      font-size:14px;
      letter-spacing:.36em;
      font-weight:700;
      white-space:nowrap;
    }
    .phase{
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size:10px;
      letter-spacing:.30em;
      text-transform:uppercase;
      color:var(--muted);
      white-space:nowrap;
    }

    nav{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--hair);
      background: rgba(245,240,232,.05);
      color: rgba(245,240,232,.86);
    }
    .btn:hover{border-color:rgba(245,240,232,.22)}
    .btn.primary{
      border-color: rgba(200,162,75,.40);
      background: rgba(200,162,75,.12);
      color: rgba(245,240,232,.92);
      box-shadow: 0 0 0 1px rgba(200,162,75,.06) inset;
    }
    .btn.primary:hover{border-color:rgba(200,162,75,.60)}

    main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:56px 0 44px;
    }

    .center{
      max-width: 760px;
      margin: 0 auto;
      padding: 0 6px;
    }

    /* Big, minimal, mysterious */
    .heroMark{
      font-size: 52px;
      line-height: 1.02;
      letter-spacing: .18em;
      font-weight: 650;
      margin: 0 0 14px;
    }

    .line{
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,162,75,.65), transparent);
      margin: 18px auto 18px;
    }

    .tag{
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      line-height: 1.7;
      letter-spacing: .02em;
      color: rgba(245,240,232,.74);
      margin: 0;
    }
    .gold{color: var(--gold)}

    footer{
      border-top:1px solid var(--hair);
      padding-top:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      text-align:center;
    }

    .names{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px 18px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 11px;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: rgba(245,240,232,.60);
      padding: 4px 0 10px;
    }
    .names span{white-space:nowrap}

    .fine{
      font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 10px;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: rgba(245,240,232,.48);
      padding-bottom: 6px;
    }

    @media (max-width:560px){
      .heroMark{font-size:40px}
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="brand">
        <div class="logoBox">
          <!-- Must match your repo file name exactly -->
          <img src="./logo.png" alt="MARIEPOSA butterfly logo" />
        </div>
        <div class="wordmark">
          <div class="name">MARIEPOSA</div>
          <div class="phase">FOUNDER PHASE</div>
        </div>
      </div>

      <nav>
        <a class="btn" href="https://www.instagram.com/mariepo.sa?igsh=NTc4MTIwNjQ2YQ==" target="_blank" rel="noreferrer">
          Instagram
        </a>
        <a class="btn primary" href="mailto:marieposa.studio@gmail.com?subject=Marieposa%20Inquiry" aria-label="Email Marieposa">
          Contact
        </a>
      </nav>
    </header>

    <main>
      <div class="center">
        <div class="heroMark">MARIEPOSA</div>
        <div class="line"></div>
        <p class="tag">
          <span class="gold">Years of experience</span> become tangible luxury.
        </p>
      </div>
    </main>

    <footer>
      <div class="names" aria-label="Names">
        <span>Misty</span>
        <span>Nancy</span>
        <span>Carol</span>
        <span>Alicia</span>
        <span>Debbie</span>
        <span>Kimbarbie</span>
      </div>
      <div class="fine">© <span id="y"></span> MARIEPOSA</div>
    </footer>

  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
