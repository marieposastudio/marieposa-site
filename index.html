<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARIEPOSA</title>
  <meta name="description" content="MARIEPOSA — Founder Phase." />

  <!-- Elegant script for the tagline -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Imperial+Script&display=swap" rel="stylesheet">

  <style>
    :root{
      --espresso:#070403;
      --espresso2:#0d0706;
      --gold:#c8a24b;
      --gold2:#e1c77a;
      --ivory:rgba(255,245,230,.92);
      --muted:rgba(255,245,230,.62);
      --hair:rgba(255,245,230,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--ivory);
      background:
        radial-gradient(900px 520px at 50% 26%, rgba(200,162,75,.22), transparent 62%),
        radial-gradient(1100px 760px at 50% 60%, rgba(0,0,0,.0), rgba(0,0,0,.52) 70%, rgba(0,0,0,.72)),
        linear-gradient(180deg, var(--espresso2), var(--espresso));
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      letter-spacing:.12em;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* IG-like depth: grain + vignette + soft highlight */
    body:before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        radial-gradient(1200px 820px at 50% 30%, rgba(255,245,230,.06), transparent 55%),
        radial-gradient(1200px 900px at 50% 55%, rgba(0,0,0,.0), rgba(0,0,0,.55) 70%, rgba(0,0,0,.78)),
        repeating-linear-gradient(135deg,
          rgba(255,255,255,.018) 0px,
          rgba(255,255,255,.018) 2px,
          rgba(0,0,0,.020) 6px,
          rgba(0,0,0,.020) 10px
        );
      mix-blend-mode: soft-light;
      opacity:.72;
    }

    /* extra “velvet” haze */
    body:after{
      content:"";
      position:fixed; inset:-20%;
      pointer-events:none;
      background:
        radial-gradient(circle at 40% 35%, rgba(200,162,75,.10), transparent 55%),
        radial-gradient(circle at 60% 40%, rgba(225,199,122,.06), transparent 60%);
      filter: blur(18px);
      opacity:.55;
    }

    a{color:inherit; text-decoration:none}

    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding:28px 22px;
      position:relative;
      z-index:1;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .mark{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 220px;
    }

    .seal{
      width:44px; height:44px;
      border-radius:999px;
      border:1px solid rgba(200,162,75,.35);
      background: radial-gradient(circle at 30% 30%, rgba(225,199,122,.16), rgba(0,0,0,.10));
      display:grid;
      place-items:center;
      box-shadow: 0 14px 34px rgba(0,0,0,.45);
      overflow:hidden;
    }
    .seal img{
      width:26px; height:26px;
      object-fit:contain;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.65));
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
      line-height:1;
    }
    .brand .name{
      font-size:12px;
      letter-spacing:.34em;
      font-family: "Italiana", ui-serif, Georgia, serif;
    }
    .brand .phase{
      font-size:10px;
      letter-spacing:.36em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(200,162,75,.28);
      background: rgba(0,0,0,.18);
      color: rgba(255,245,230,.82);
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      cursor:pointer;
    }
    .pill:hover{
      transform: translateY(-1px);
      border-color: rgba(200,162,75,.55);
      background: rgba(0,0,0,.28);
    }

    .rule{
      height:1px;
      background: linear-gradient(90deg, transparent, var(--hair), transparent);
      margin:18px 0 0;
    }

    main{
      flex:1;
      display:grid;
      place-items:center;
      padding:36px 0 24px;
      text-align:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px; /* tighter */
      max-width: 860px;
      width:100%;
    }

    .logo{
      width:min(560px, 84vw);
      height:auto;
      display:block;
      filter:
        drop-shadow(0 26px 60px rgba(0,0,0,.65))
        drop-shadow(0 0 26px rgba(200,162,75,.14));
      opacity:.99;
    }

    /* More elegant, cursive, closer */
    .tagline{
      margin-top:-6px;
      font-family: "Imperial Script", cursive;
      font-size:28px;
      letter-spacing:.02em;
      color: rgba(225,199,122,.80);
      text-transform:none;
    }

    footer{
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(255,245,230,.06);
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      text-align:center;
    }

    .names{
      font-size:11px;
      color: rgba(255,245,230,.55);
      letter-spacing:.30em;
      text-transform:uppercase;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:14px;
    }

    .tiny{
      font-size:10px;
      color: rgba(255,245,230,.35);
      letter-spacing:.26em;
      text-transform:uppercase;
    }

    /* Contact modal */
    .modalOverlay{
      position:fixed; inset:0;
      background: rgba(0,0,0,.65);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:10;
    }
    .modal{
      width:min(520px, 96vw);
      border-radius:18px;
      border:1px solid rgba(200,162,75,.28);
      background:
        radial-gradient(900px 520px at 50% 0%, rgba(200,162,75,.16), transparent 60%),
        rgba(6,4,3,.92);
      box-shadow: 0 30px 80px rgba(0,0,0,.70);
      padding:18px 18px 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .modalHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .modalTitle{
      font-family:"Italiana", ui-serif, Georgia, serif;
      letter-spacing:.22em;
      text-transform:uppercase;
      font-size:12px;
      color: rgba(255,245,230,.85);
    }
    .closeBtn{
      width:34px; height:34px;
      border-radius:999px;
      border:1px solid rgba(255,245,230,.14);
      background: rgba(0,0,0,.18);
      color: rgba(255,245,230,.80);
      cursor:pointer;
      display:grid;
      place-items:center;
    }
    .closeBtn:hover{ border-color: rgba(200,162,75,.50); }

    form{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }
    label{
      font-size:10px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color: rgba(255,245,230,.55);
      text-align:left;
    }
    input, textarea{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(255,245,230,.10);
      background: rgba(0,0,0,.22);
      color: rgba(255,245,230,.90);
      padding:12px 12px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing:.02em;
      outline:none;
    }
    textarea{ min-height:120px; resize:vertical; }
    input:focus, textarea:focus{ border-color: rgba(200,162,75,.55); }

    .submitRow{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      margin-top:6px;
    }
    .submitBtn{
      padding:12px 16px;
      border-radius:999px;
      border:1px solid rgba(200,162,75,.45);
      background: rgba(200,162,75,.12);
      color: rgba(255,245,230,.90);
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      cursor:pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .submitBtn:hover{
      transform: translateY(-1px);
      border-color: rgba(225,199,122,.70);
      background: rgba(200,162,75,.18);
    }

    @media (max-width:520px){
      .mark{min-width:auto}
      .brand .name{font-size:11px}
      .pill{padding:10px 12px}
      main{padding:32px 0 18px}
      .tagline{font-size:24px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="mark" aria-label="Marieposa">
        <div class="seal" aria-hidden="true">
          <img src="logo.png" alt="" />
        </div>
        <div class="brand">
          <div class="name">MARIEPOSA</div>
          <div class="phase">Founder Phase</div>
        </div>
      </div>

      <nav class="nav" aria-label="Links">
        <a class="pill" href="https://www.instagram.com/mariepo.sa" target="_blank" rel="noreferrer">Instagram</a>
        <button class="pill" id="contactOpen" type="button">Contact</button>
      </nav>
    </header>

    <div class="rule"></div>

    <main>
      <div class="hero">
        <img class="logo" src="logo.png" alt="MARIEPOSA" />
        <div class="tagline">Years of experience become tangible luxury.</div>
      </div>
    </main>

    <footer>
      <div class="names" aria-label="Collection names">
        <span>Misty</span>
        <span>Nancy</span>
        <span>Carol</span>
        <span>Alicia</span>
        <span>Debbie</span>
        <span>Kimbarbie</span>
      </div>
      <div class="tiny">© <span id="y"></span> MARIEPOSA</div>
    </footer>
  </div>

  <!-- Contact modal (Netlify Forms) -->
  <div class="modalOverlay" id="contactModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Contact MARIEPOSA">
      <div class="modalHeader">
        <div class="modalTitle">Contact</div>
        <button class="closeBtn" id="contactClose" type="button" aria-label="Close">✕</button>
      </div>

      <!-- Netlify will capture this form. Your email does NOT appear anywhere on the page. -->
      <form name="contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="contact" />

        <label for="email">Your Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required />

        <label for="subject">Subject</label>
        <input id="subject" name="subject" type="text" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <div class="submitRow">
          <button class="submitBtn" type="submit">Send</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();

    const modal = document.getElementById("contactModal");
    const openBtn = document.getElementById("contactOpen");
    const closeBtn = document.getElementById("contactClose");

    function openModal(){
      modal.style.display = "flex";
      modal.setAttribute("aria-hidden","false");
    }
    function closeModal(){
      modal.style.display = "none";
      modal.setAttribute("aria-hidden","true");
    }

    openBtn.addEventListener("click", openModal);
    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => { if(e.target === modal) closeModal(); });
    document.addEventListener("keydown", (e) => { if(e.key === "Escape") closeModal(); });
  </script>
</body>
</html>
