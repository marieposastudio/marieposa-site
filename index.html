<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MARIEPOSA — Founder Phase</title>

<style>
body{
  margin:0;
  background:#000;
  color:#eee;
  font-family:"Times New Roman", serif;
  overflow-x:hidden;
}

/* deep luxury background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 40%,
      rgba(201,162,74,0.18) 0%,
      rgba(0,0,0,0.6) 45%,
      rgba(0,0,0,0.95) 75%,
      #000 100%);
  z-index:-2;
}

/* subtle grain texture */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity:0.15;
  z-index:-1;
}

/* header */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:30px 40px;
}

.brand{
  letter-spacing:6px;
  font-size:18px;
}

.brand small{
  display:block;
  font-size:11px;
  letter-spacing:6px;
  opacity:0.7;
  margin-top:6px;
}

nav a{
  color:#eee;
  text-decoration:none;
  border:1px solid rgba(201,162,74,0.5);
  padding:10px 18px;
  border-radius:30px;
  font-size:12px;
  letter-spacing:3px;
  margin-left:10px;
  transition:0.3s;
}

nav a:hover{
  background:rgba(201,162,74,0.15);
}

/* center */
main{
  text-align:center;
  padding-top:100px;
}

.logo{
  width:420px;
  max-width:85%;
  filter:
    drop-shadow(0 30px 60px rgba(0,0,0,0.8))
    drop-shadow(0 80px 180px rgba(0,0,0,0.95));
}

/* gold gradient tagline */
.tagline{
  margin-top:35px;
  font-size:20px;
  font-style:italic;
  letter-spacing:2px;
  background:linear-gradient(to right,#f8e8b0,#c9a24a,#8a6a22);
  -webkit-background-clip:text;
  color:transparent;
}

/* contact form */
.contact-section{
  margin-top:60px;
}

input, textarea{
  background:#111;
  border:1px solid rgba(201,162,74,0.4);
  color:#eee;
  padding:12px;
  margin:10px 0;
  width:260px;
  border-radius:6px;
  font-family:inherit;
}

textarea{
  height:90px;
  resize:none;
}

button{
  background:transparent;
  border:1px solid rgba(201,162,74,0.6);
  color:#eee;
  padding:10px 22px;
  border-radius:30px;
  letter-spacing:3px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:rgba(201,162,74,0.2);
}

/* footer */
footer{
  text-align:center;
  margin-top:120px;
  padding-bottom:40px;
  font-size:11px;
  letter-spacing:6px;
  opacity:0.7;
}
</style>
</head>

<body>

<header>
  <div class="brand">
    MARIEPOSA
    <small>FOUNDER PHASE</small>
  </div>

  <nav>
    <a href="https://instagram.com/mariepo.sa" target="_blank">INSTAGRAM</a>
  </nav>
</header>

<main>

  <img src="logo.png" class="logo">

  <div class="tagline">
    Years of experience become tangible luxury
  </div>

  <div class="contact-section">
    <form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">
      <input type="hidden" name="_captcha" value="false">
      <input type="text" name="name" placeholder="NAME" required><br>
      <input type="email" name="email" placeholder="EMAIL" required><br>
      <textarea name="message" placeholder="MESSAGE" required></textarea><br>
      <button type="submit">INQUIRE</button>
    </form>
  </div>

</main>

<footer>
  MISTY &nbsp; NANCY &nbsp; CAROL &nbsp; ALICIA &nbsp; DEBBIE &nbsp; KIMBARBIE
  <br><br>
  © 2026 MARIEPOSA
</footer>

</body>
</html>
