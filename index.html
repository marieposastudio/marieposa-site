<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Message Sent — MARIEPOSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:opsz,wght@5..120,400,500,600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#050505;
      --gold:#caa54b;
      --serif:"Didot","Bodoni 72","Bodoni MT","Didot LT STD","Playfair Display",Georgia,serif;
    }
    html,body{height:100%;}
    body{
      margin:0;
      display:grid;
      place-items:center;
      color:rgba(242,242,242,.9);
      font-family:var(--serif);
      background:
        radial-gradient(1200px 700px at 45% 40%, rgba(202,165,75,.10), rgba(0,0,0,0) 60%),
        linear-gradient(180deg,#070707,#050505);
    }
    .box{
      text-align:center;
      padding:28px 18px;
      width:min(780px,92vw);
    }
    h1{
      margin:0 0 8px;
      letter-spacing:.34em;
      text-transform:uppercase;
      font-weight:500;
      font-size:26px;
    }
    p{
      margin:0 0 18px;
      color:rgba(202,165,75,.85);
      font-style:italic;
      letter-spacing:.06em;
    }
    a{
      display:inline-block;
      text-decoration:none;
      color:rgba(242,242,242,.9);
      border:1px solid rgba(202,165,75,.35);
      padding:12px 18px;
      border-radius:999px;
      letter-spacing:.24em;
      text-transform:uppercase;
      font-size:11px;
      background:rgba(0,0,0,.35);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Message Sent</h1>
    <p>Thank you. Your note has been received.</p>
    <a href="/">Return</a>
  </div>
</body>
</html>
