<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARIEPOSA</title>
  <meta name="description" content="MARIEPOSA — Founder Phase." />
  <style>
    :root{
      --espresso:#070403;
      --espresso-2:#0d0706;
      --gold:#c8a24b;
      --gold-2:#e1c77a;
      --ivory:rgba(255,245,230,.92);
      --muted:rgba(255,245,230,.62);
      --hair:rgba(255,245,230,.10);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--ivory);
      background:
        radial-gradient(1100px 700px at 50% 20%, rgba(200,162,75,.14), transparent 60%),
        radial-gradient(900px 600px at 20% 85%, rgba(255,245,230,.05), transparent 65%),
        linear-gradient(180deg, var(--espresso-2), var(--espresso));
      font-family: ui-serif, Georgia, "Times New Roman", Times, serif;
      letter-spacing:.12em;
      overflow-x:hidden;
    }

    /* subtle “leather” depth without an image */
    body:before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        radial-gradient(1200px 900px at 35% 30%, rgba(0,0,0,.0), rgba(0,0,0,.35) 62%, rgba(0,0,0,.55)),
        repeating-linear-gradient(115deg,
          rgba(255,255,255,.010) 0px,
          rgba(255,255,255,.010) 2px,
          rgba(0,0,0,.010) 6px,
          rgba(0,0,0,.010) 10px
        );
      mix-blend-mode: soft-light;
      opacity:.55;
    }

    a{color:inherit; text-decoration:none}
    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding:28px 22px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .mark{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 220px;
    }

    .seal{
      width:44px; height:44px;
      border-radius:999px;
      border:1px solid rgba(200,162,75,.35);
      background: radial-gradient(circle at 30% 30%, rgba(225,199,122,.18), rgba(0,0,0,.10));
      display:grid;
      place-items:center;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .seal img{
      width:26px; height:26px;
      object-fit:contain;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.55));
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
      line-height:1;
    }
    .brand .name{
      font-size:12px;
      letter-spacing:.34em;
    }
    .brand .phase{
      font-size:10px;
      letter-spacing:.36em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(200,162,75,.28);
      background: rgba(0,0,0,.18);
      color: rgba(255,245,230,.82);
      font-size:11px;
      letter-spacing:.22em;
      text-transform:uppercase;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .pill:hover{
      transform: translateY(-1px);
      border-color: rgba(200,162,75,.55);
      background: rgba(0,0,0,.28);
    }

    .rule{
      height:1px;
      background: linear-gradient(90deg, transparent, var(--hair), transparent);
      margin:18px 0 0;
    }

    main{
      flex:1;
      display:grid;
      place-items:center;
      padding:48px 0 28px;
      text-align:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      max-width: 860px;
      width:100%;
    }

    /* MAIN LOGO */
    .logo{
      width:min(520px, 82vw);
      height:auto;
      display:block;
      filter:
        drop-shadow(0 22px 50px rgba(0,0,0,.55))
        drop-shadow(0 0 22px rgba(200,162,75,.12));
      opacity:.98;
    }

    .tagline{
      font-size:12px;
      letter-spacing:.26em;
      text-transform:uppercase;
      color: rgba(200,162,75,.78);
    }

    footer{
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(255,245,230,.06);
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      text-align:center;
    }

    .names{
      font-size:11px;
      color: rgba(255,245,230,.55);
      letter-spacing:.30em;
      text-transform:uppercase;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:14px;
    }

    .tiny{
      font-size:10px;
      color: rgba(255,245,230,.35);
      letter-spacing:.26em;
      text-transform:uppercase;
    }

    @media (max-width:520px){
      .mark{min-width:auto}
      .brand .name{font-size:11px}
      .pill{padding:10px 12px}
      main{padding:40px 0 22px}
      .tagline{font-size:11px; letter-spacing:.22em}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="mark" aria-label="Marieposa">
        <div class="seal" aria-hidden="true">
          <!-- small butterfly mark (use a transparent butterfly-only png if you have it; logo.png works too) -->
          <img src="logo.png" alt="" />
        </div>
        <div class="brand">
          <div class="name">MARIEPOSA</div>
          <div class="phase">Founder Phase</div>
        </div>
      </div>

      <nav class="nav" aria-label="Links">
        <a class="pill" href="https://www.instagram.com/mariepo.sa" target="_blank" rel="noreferrer">Instagram</a>
        <a class="pill" href="mailto:marieposa.studio@gmail.com?subject=Marieposa%20Inquiry">Contact</a>
      </nav>
    </header>

    <div class="rule"></div>

    <main>
      <div class="hero">
        <!-- MAIN centered logo -->
        <img class="logo" src="logo.png" alt="MARIEPOSA" />
        <div class="tagline">Years of experience become tangible luxury.</div>
      </div>
    </main>

    <footer>
      <div class="names" aria-label="Collection names">
        <span>Misty</span>
        <span>Nancy</span>
        <span>Carol</span>
        <span>Alicia</span>
        <span>Debbie</span>
        <span>Kimbarbie</span>
      </div>
      <div class="tiny">© 2026 MARIEPOSA</div>
    </footer>
  </div>
</body>
</html>
