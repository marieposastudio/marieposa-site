<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARIEPOSA — Founder Phase</title>
  <meta name="description" content="MARIEPOSA — Founder Phase" />

  <style>
    :root{
      /* Core palette */
      --bg0:#050505;        /* near-black */
      --bg1:#090909;        /* subtle lift */
      --gold:#caa24a;       /* warm gold */
      --gold2:#e2c36e;      /* highlight */
      --ink:#eae6dd;        /* warm light text */
      --muted:rgba(234,230,221,.72);
      --faint:rgba(234,230,221,.45);
      --line:rgba(202,162,74,.18);
      --line2:rgba(234,230,221,.10);

      /* Type */
      --serif: "Didot","Bodoni MT","Bodoni 72","Didot LT STD","Playfair Display","Times New Roman",Times,serif;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--ink);
      font-family:var(--serif);
      background: var(--bg0);
      overflow-x:hidden;
    }

    /* Background: deep black + “lit” vignette + subtle texture */
    .bg{
      position:fixed;
      inset:0;
      z-index:-3;
      background:
        radial-gradient(900px 650px at 42% 42%, rgba(202,162,74,.14), transparent 58%),
        radial-gradient(900px 650px at 58% 46%, rgba(202,162,74,.10), transparent 62%),
        radial-gradient(1200px 900px at 50% 40%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(1400px 1100px at 50% 55%, rgba(0,0,0,.10), rgba(0,0,0,.78) 70%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      filter:saturate(110%) contrast(110%);
    }

    /* Leather-ish grain overlay (CSS noise approximation) */
    .grain{
      position:fixed;
      inset:-30%;
      z-index:-2;
      pointer-events:none;
      opacity:.22;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.10), transparent 55%),
        radial-gradient(circle at 70% 45%, rgba(255,255,255,.08), transparent 60%),
        radial-gradient(circle at 45% 75%, rgba(255,255,255,.06), transparent 55%),
        repeating-radial-gradient(circle at 50% 50%,
          rgba(255,255,255,.04) 0px,
          rgba(255,255,255,.02) 1px,
          rgba(0,0,0,.00) 3px,
          rgba(0,0,0,.00) 6px
        );
      transform:rotate(-2deg);
      mix-blend-mode:overlay;
    }

    /* Extra edge vignette for depth */
    .vignette{
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(1200px 900px at 50% 45%, transparent 45%, rgba(0,0,0,.70) 78%, rgba(0,0,0,.92) 100%);
    }

    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:28px 38px;
      gap:18px;
    }

    .brand-left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:260px;
    }

    .mark{
      width:34px;
      height:34px;
      border-radius:999px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      background: radial-gradient(circle at 35% 30%, rgba(202,162,74,.16), rgba(0,0,0,.10) 55%, rgba(0,0,0,.55) 100%);
      box-shadow: 0 12px 30px rgba(0,0,0,.55);
      overflow:hidden;
      flex:0 0 auto;
    }
    .mark img{
      width:18px;
      height:18px;
      object-fit:contain;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.55));
      opacity:.92;
    }

    .brand-text{
      line-height:1.05;
      letter-spacing:.22em;
      text-transform:uppercase;
    }
    .brand-text .name{
      font-family:var(--serif);
      font-size:14px;
      color:rgba(234,230,221,.92);
    }
    .brand-text .phase{
      margin-top:6px;
      font-family:var(--serif);
      font-size:11px;
      color:rgba(202,162,74,.85);
      letter-spacing:.36em;
    }

    .nav{
      display:flex;
      align-items:center;
      gap:14px;
    }
    .pill{
      appearance:none;
      border:1px solid rgba(202,162,74,.35);
      background: rgba(0,0,0,.25);
      color:rgba(234,230,221,.90);
      padding:10px 16px;
      border-radius:999px;
      letter-spacing:.14em;
      font-size:12px;
      text-transform:uppercase;
      cursor:pointer;
      transition:transform .12s ease, border-color .12s ease, background .12s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:10px;
    }
    .pill:hover{
      transform:translateY(-1px);
      border-color:rgba(202,162,74,.55);
      background: rgba(0,0,0,.35);
    }
    .pill:active{transform:translateY(0px)}

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, var(--line2), transparent);
      margin:0 38px;
    }

    main{
      flex:1;
      display:grid;
      place-items:center;
      padding:28px 18px 8px;
      text-align:center;
    }

    .hero{
      width:min(920px, 92vw);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      padding:24px 10px 10px;
    }

    .logo{
      width:min(330px, 62vw);
      aspect-ratio:1 / 1;
      display:grid;
      place-items:center;
      border-radius:24px;
      background: radial-gradient(circle at 50% 45%, rgba(255,255,255,.06), transparent 58%);
    }

    .logo img{
      width:78%;
      height:auto;
      object-fit:contain;
      filter:
        drop-shadow(0 22px 28px rgba(0,0,0,.78))
        drop-shadow(0 0 22px rgba(202,162,74,.25));
    }

    .tagline{
      font-family:var(--serif);
      color: rgba(202,162,74,.92);
      font-size:18px;
      letter-spacing:.06em;
      font-style:italic;
      text-shadow: 0 10px 28px rgba(0,0,0,.85);
      margin-top:6px;
    }

    footer{
      padding:22px 38px 30px;
      text-align:center;
      color:rgba(234,230,221,.55);
    }

    .footer-line{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(234,230,221,.12), transparent);
      margin:0 0 18px;
    }

    .names{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:22px;
      letter-spacing:.34em;
      text-transform:uppercase;
      font-size:11px;
      color:rgba(234,230,221,.58);
    }

    .copy{
      margin-top:10px;
      letter-spacing:.20em;
      text-transform:uppercase;
      font-size:10px;
      color:rgba(234,230,221,.40);
      font-family:var(--sans);
    }

    /* Modal */
    .modal-backdrop{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }
    .modal{
      width:min(560px, 92vw);
      border-radius:18px;
      border:1px solid rgba(202,162,74,.28);
      background:
        radial-gradient(800px 450px at 30% 20%, rgba(202,162,74,.12), transparent 55%),
        linear-gradient(180deg, rgba(12,12,12,.92), rgba(6,6,6,.92));
      box-shadow: 0 30px 90px rgba(0,0,0,.75);
      overflow:hidden;
    }
    .modal header{
      padding:18px 18px 10px;
    }
    .modal-title{
      text-align:left;
      width:100%;
      line-height:1.15;
    }
    .modal-title .t1{
      letter-spacing:.22em;
      text-transform:uppercase;
      font-size:12px;
      color:rgba(234,230,221,.86);
      font-family:var(--serif);
    }
    .modal-title .t2{
      margin-top:6px;
      font-family:var(--sans);
      font-size:12px;
      color:rgba(234,230,221,.58);
    }
    .close{
      margin-left:auto;
      background:transparent;
      color:rgba(234,230,221,.75);
      border:1px solid rgba(234,230,221,.20);
      border-radius:999px;
      padding:8px 12px;
      cursor:pointer;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:11px;
    }
    .modal-body{
      padding:0 18px 18px;
    }
    form{
      display:grid;
      gap:12px;
      margin-top:12px;
    }
    label{
      display:grid;
      gap:6px;
      text-align:left;
      font-family:var(--sans);
      font-size:12px;
      color:rgba(234,230,221,.70);
    }
    input, textarea{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(234,230,221,.18);
      background: rgba(0,0,0,.30);
      color:rgba(234,230,221,.92);
      padding:11px 12px;
      font-family:var(--sans);
      font-size:13px;
      outline:none;
    }
    input:focus, textarea:focus{
      border-color: rgba(202,162,74,.55);
      box-shadow: 0 0 0 3px rgba(202,162,74,.12);
    }
    textarea{min-height:120px; resize:vertical}

    .send{
      justify-self:end;
      border:1px solid rgba(202,162,74,.45);
      background: rgba(202,162,74,.14);
      color:rgba(234,230,221,.92);
      padding:10px 16px;
      border-radius:999px;
      letter-spacing:.16em;
      text-transform:uppercase;
      font-size:12px;
      cursor:pointer;
    }
    .send:hover{
      background: rgba(202,162,74,.18);
      border-color: rgba(202,162,74,.65);
    }

    /* Responsive tweaks */
    @media (max-width:640px){
      header{padding:22px 18px}
      .divider{margin:0 18px}
      footer{padding:22px 18px 26px}
      .brand-left{min-width:auto}
      .tagline{font-size:16px}
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="wrap">
    <header>
      <div class="brand-left">
        <div class="mark" aria-hidden="true">
          <img src="logo.png" alt="" />
        </div>
        <div class="brand-text">
          <div class="name">MARIEPOSA</div>
          <div class="phase">FOUNDER PHASE</div>
        </div>
      </div>

      <nav class="nav">
        <!-- Replace href with your actual IG profile link -->
        <a class="pill" href="https://instagram.com/" target="_blank" rel="noreferrer">INSTAGRAM</a>
        <button class="pill" type="button" id="openContact">CONTACT</button>
      </nav>
    </header>

    <div class="divider"></div>

    <main>
      <section class="hero" aria-label="Marieposa Founder Phase">
        <div class="logo">
          <img src="logo.png" alt="Marieposa butterfly logo" />
        </div>

        <div class="tagline">Years of experience become tangible luxury.</div>
      </section>
    </main>

    <footer>
      <div class="footer-line"></div>
      <div class="names" aria-label="Collection names">
        <span>Misty</span>
        <span>Nancy</span>
        <span>Carol</span>
        <span>Alicia</span>
        <span>Debbie</span>
        <span>Kimbarbie</span>
      </div>
      <div class="copy">© <span id="y"></span> MARIEPOSA</div>
    </footer>
  </div>

  <!-- Contact modal (Netlify Forms; does NOT expose your email) -->
  <div class="modal-backdrop" id="backdrop" role="dialog" aria-modal="true" aria-labelledby="contactTitle">
    <div class="modal">
      <header>
        <div class="modal-title">
          <div class="t1" id="contactTitle">CONTACT</div>
          <div class="t2">Send a note. Your email stays private between you and Marieposa.</div>
        </div>
        <button class="close" type="button" id="closeContact">CLOSE</button>
      </header>

      <div class="modal-body">
        <!-- Netlify needs:
             1) data-netlify="true"
             2) a matching hidden input name="form-name"
             3) a real <form> in the deployed HTML
             4) optional honeypot for spam
        -->
        <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">
          <input type="hidden" name="form-name" value="contact" />

          <!-- Honeypot field (hidden from humans) -->
          <p style="display:none;">
            <label>Don’t fill this out if you’re human: <input name="bot-field" /></label>
          </p>

          <label>
            Your email
            <input type="email" name="email" autocomplete="email" required />
          </label>

          <label>
            Subject
            <input type="text" name="subject" autocomplete="off" required />
          </label>

          <label>
            Message
            <textarea name="message" required></textarea>
          </label>

          <button class="send" type="submit">SEND</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Year
    document.getElementById("y").textContent = new Date().getFullYear();

    // Modal open/close
    const backdrop = document.getElementById("backdrop");
    const openBtn = document.getElementById("openContact");
    const closeBtn = document.getElementById("closeContact");

    function openModal(){
      backdrop.style.display = "flex";
      document.body.style.overflow = "hidden";
    }
    function closeModal(){
      backdrop.style.display = "none";
      document.body.style.overflow = "";
    }

    openBtn.addEventListener("click", openModal);
    closeBtn.addEventListener("click", closeModal);

    backdrop.addEventListener("click", (e) => {
      if (e.target === backdrop) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && backdrop.style.display === "flex") closeModal();
    });
  </script>
</body>
</html>
