<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MARIEPOSA</title>
  <meta name="description" content="MARIEPOSA — Founder Phase." />

  <!-- Fonts: luxury serif + readable elegant script -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Espresso + gold */
      --espresso:#070605;               /* near-black espresso */
      --espresso2:#0f0b08;
      --gold:#d7b86a;                   /* warm gold */
      --gold2:#b99443;                  /* deeper gold */
      --cream:#f4efe5;                  /* soft warm highlight */
      --muted:rgba(244,239,229,.72);
      --line:rgba(215,184,106,.18);
      --hair:rgba(244,239,229,.08);
      --shadow:rgba(0,0,0,.65);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: var(--espresso);
      color: var(--cream);
      font-family: "Playfair Display", Didot, "Bodoni MT", "Times New Roman", serif;
      letter-spacing:.02em;
      overflow-x:hidden;
    }

    /* --- TEXTURED BACKGROUND LAYERS --- */
    .bg{
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(1200px 800px at 50% 40%, rgba(215,184,106,.08), transparent 55%),
        radial-gradient(900px 700px at 30% 55%, rgba(255,255,255,.05), transparent 60%),
        radial-gradient(1100px 900px at 70% 60%, rgba(0,0,0,.55), transparent 60%),
        linear-gradient(180deg, var(--espresso2), var(--espresso));
    }

    /* Add a stronger leather-like texture:
       If you upload a file named texture.jpg into the repo root,
       this layer will pick it up automatically. */
    .bg::before{
      content:"";
      position:absolute;
      inset:-20%;
      background-image:
        url("texture.jpg");
      background-size:cover;
      background-position:center;
      opacity:.46;                /* strong texture */
      filter: contrast(1.12) saturate(.85) brightness(.68);
      mix-blend-mode: multiply;   /* makes it feel like leather */
      transform: rotate(-1deg) scale(1.05);
      pointer-events:none;
    }

    /* Fallback micro-noise (still works if texture.jpg is not present) */
    .bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-radial-gradient(circle at 20% 30%,
          rgba(255,255,255,.020) 0px,
          rgba(255,255,255,.020) 1px,
          rgba(0,0,0,0) 2px,
          rgba(0,0,0,0) 4px);
      opacity:.55;
      mix-blend-mode: overlay;
      filter: blur(.15px);
      pointer-events:none;
    }

    /* --- LAYOUT --- */
    .wrap{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:24px 28px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
    }

    .brandlock{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:220px;
    }

    .mark{
      width:40px;
      height:40px;
      border-radius:999px;
      border:1px solid rgba(215,184,106,.22);
      background: rgba(0,0,0,.20);
      display:grid;
      place-items:center;
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
      overflow:hidden;
    }
    .mark img{
      width:22px;
      height:auto;
      display:block;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.45));
      opacity:.95;
    }

    .brandtext{
      display:flex;
      flex-direction:column;
      gap:2px;
      line-height:1;
    }
    .brandtext .name{
      font-size:15px;
      letter-spacing:.34em;
      text-transform:uppercase;
      color: rgba(244,239,229,.92);
    }
    .brandtext .phase{
      font-size:11px; /* more readable */
      letter-spacing:.32em;
      text-transform:uppercase;
      color: rgba(215,184,106,.72);
    }

    .nav{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .pill{
      appearance:none;
      border:1px solid rgba(215,184,106,.28);
      background: rgba(0,0,0,.20);
      color: rgba(244,239,229,.86);
      padding:10px 14px;
      border-radius:999px;
      text-decoration:none;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      box-shadow: 0 14px 28px rgba(0,0,0,.25);
      cursor:pointer;
    }
    .pill:hover{
      transform: translateY(-1px);
      border-color: rgba(215,184,106,.45);
      background: rgba(0,0,0,.28);
    }

    .rule{
      height:1px;
      background: linear-gradient(90deg, transparent, var(--hair), transparent);
      margin: 0 28px;
    }

    main{
      flex:1;
      display:grid;
      place-items:center;
      padding: 34px 22px 18px;
      text-align:center;
    }

    .hero{
      width:min(900px, 92vw);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
    }

    .emblem{
      width:min(420px, 70vw);
      max-width:520px;
      height:auto;
      display:block;
      filter:
        drop-shadow(0 30px 55px rgba(0,0,0,.75))
        drop-shadow(0 10px 18px rgba(215,184,106,.18));
      opacity:.98;
      transform: translateZ(0);
    }

    .tagline{
      font-family: "Allura", cursive;
      font-size: clamp(20px, 2.4vw, 32px);
      color: rgba(215,184,106,.88);
      letter-spacing:.02em;
      text-shadow: 0 1px 0 rgba(0,0,0,.35);
      margin-top:-6px;
    }

    .tagline::before{
      content:"";
      display:block;
      width: 70px;
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(215,184,106,.42), transparent);
      margin: 0 auto 10px;
    }

    footer{
      padding: 18px 22px 28px;
      text-align:center;
      color: rgba(244,239,229,.62);
    }

    .names{
      display:flex;
      justify-content:center;
      gap:22px;
      flex-wrap:wrap;
      font-size:11px;
      letter-spacing:.28em;
      text-transform:uppercase;
      color: rgba(244,239,229,.55);
      margin-bottom:10px;
    }

    .copyright{
      font-size:11px;
      letter-spacing:.14em;
      color: rgba(244,239,229,.35);
      text-transform:uppercase;
    }

    /* --- CONTACT MODAL (no email exposed) --- */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      padding: 22px;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(6px);
      z-index:50;
    }
    .modal[aria-hidden="false"]{ display:grid; }

    .panel{
      width:min(560px, 92vw);
      border-radius:18px;
      border:1px solid rgba(215,184,106,.22);
      background:
        radial-gradient(1200px 500px at 50% 0%, rgba(215,184,106,.10), transparent 55%),
        rgba(6,5,4,.92);
      box-shadow: 0 40px 90px rgba(0,0,0,.75);
      overflow:hidden;
    }
    .panelHead{
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid rgba(244,239,229,.08);
    }
    .panelHead .title{
      font-size:12px;
      letter-spacing:.26em;
      text-transform:uppercase;
      color: rgba(244,239,229,.82);
    }
    .x{
      border:1px solid rgba(215,184,106,.24);
      background: rgba(0,0,0,.25);
      color: rgba(244,239,229,.80);
      border-radius:999px;
      width:38px;
      height:38px;
      cursor:pointer;
    }
    .panelBody{
      padding:18px;
    }
    label{
      display:block;
      font-size:11px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color: rgba(244,239,229,.62);
      margin: 12px 0 8px;
    }
    input, textarea{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(215,184,106,.20);
      background: rgba(0,0,0,.25);
      color: rgba(244,239,229,.90);
      padding:12px 12px;
      outline:none;
      font-family: inherit;
      letter-spacing:.02em;
    }
    textarea{ min-height:120px; resize:vertical; }

    .actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:14px;
    }
    .btn{
      border-radius:999px;
      border:1px solid rgba(215,184,106,.28);
      background: rgba(0,0,0,.20);
      color: rgba(244,239,229,.86);
      padding:10px 14px;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      cursor:pointer;
    }
    .btn.primary{
      background: rgba(215,184,106,.14);
      border-color: rgba(215,184,106,.44);
    }

    .note{
      margin-top:10px;
