<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARIEPOSA — Message Sent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0; min-height:100vh;
      display:grid; place-items:center;
      background:#050505;
      color:rgba(255,255,255,.88);
      font-family:"Cormorant Garamond","Didot","Bodoni MT","Times New Roman",serif;
      text-align:center;
      padding:28px;
    }
    .wrap{ max-width:720px; }
    .gold{ color: rgba(201,161,74,.88); font-style:italic; }
    a{
      display:inline-block;
      margin-top:18px;
      text-decoration:none;
      border:1px solid rgba(201,161,74,.45);
      padding:10px 14px;
      border-radius:999px;
      color:rgba(255,255,255,.88);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-size:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="letter-spacing:.18em; text-transform:uppercase; font-weight:500; margin:0 0 10px;">Message Sent</h1>
    <div class="gold">Thank you. Your note has been received.</div>
    <a href="/">Return</a>
  </div>
</body>
</html>
