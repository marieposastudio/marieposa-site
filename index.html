<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MARIEPOSA — Founder Phase</title>

<style>
body{
  margin:0;
  background:#000;
  color:#eee;
  font-family:"Times New Roman", serif;
  overflow-x:hidden;
}

/* subtle spotlight */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center,
      rgba(201,162,74,0.15) 0%,
      rgba(0,0,0,0.4) 40%,
      rgba(0,0,0,0.95) 75%,
      #000 100%);
  z-index:-1;
}

/* header */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:30px 40px;
}

.brand{
  letter-spacing:6px;
}

.brand small{
  display:block;
  font-size:11px;
  letter-spacing:6px;
  opacity:0.7;
  margin-top:6px;
}

nav a{
  color:#eee;
  text-decoration:none;
  border:1px solid rgba(201,162,74,0.4);
  padding:10px 18px;
  border-radius:30px;
  font-size:12px;
  letter-spacing:3px;
  margin-left:10px;
}

/* center */
main{
  text-align:center;
  padding-top:80px;
}

.logo{
  width:420px;
  max-width:85%;
  filter:
    drop-shadow(0 25px 50px rgba(0,0,0,0.6))
    drop-shadow(0 60px 120px rgba(0,0,0,0.9));
}

.tagline{
  margin-top:30px;
  font-size:18px;
  font-style:italic;
  letter-spacing:2px;
  background:linear-gradient(to right,#f6e3a1,#c9a24a,#8a6a22);
  -webkit-background-clip:text;
  color:transparent;
}

/* footer */
footer{
  text-align:center;
  margin-top:120px;
  padding-bottom:40px;
  font-size:11px;
  letter-spacing:6px;
  opacity:0.7;
}
</style>
</head>

<body>

<header>
  <div class="brand">
    MARIEPOSA
    <small>FOUNDER PHASE</small>
  </div>

  <nav>
    <a href="https://instagram.com/mariepo.sa" target="_blank">INSTAGRAM</a>
    <a href="https://instagram.com/direct/inbox/" target="_blank">CONTACT</a>
  </nav>
</header>

<main>
  <img src="logo.png" class="logo">

  <div class="tagline">
    Years of experience become tangible luxury
  </div>
</main>

<footer>
  MISTY &nbsp; NANCY &nbsp; CAROL &nbsp; ALICIA &nbsp; DEBBIE &nbsp; KIMBARBIE
  <br><br>
  © 2026 MARIEPOSA
</footer>

</body>
</html>
